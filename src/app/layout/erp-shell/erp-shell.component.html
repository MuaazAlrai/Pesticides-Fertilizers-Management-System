<div class="app-shell" [class.sidebar-visible]="sidebarOpen()">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark"><lucide-icon [img]="icons.Store" [size]="22" /></span>
      <div><strong>ملک اشرف ٹریڈرز</strong><small>ERP v2.0</small></div>
      <button class="mobile-close" type="button" title="مینو بند کریں" (click)="closeSidebar()"><lucide-icon [img]="icons.X" [size]="20" /></button>
    </div>
    <nav>
      @for (link of links; track $index) {
        <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.path === '/dashboard'}" (click)="closeSidebar()">
          <lucide-icon [img]="link.icon" [size]="18" /><span>{{ link.label }}</span>
        </a>
      }
    </nav>
    <a class="settings" routerLink="/dashboard"><lucide-icon [img]="icons.Settings" [size]="18" /><span>ترتیبات</span></a>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="topbar-title">
        <button class="menu-btn" type="button" title="مینو کھولیں" (click)="sidebarOpen.set(true)"><lucide-icon [img]="icons.Menu" [size]="23" /></button>
        <strong>کاروباری انتظام</strong>
      </div>
      <div class="topbar-actions">
        <label class="top-search"><lucide-icon [img]="icons.Search" [size]="17" /><input placeholder="تلاش" /></label>
        <button class="bell" type="button" title="اطلاعات"><lucide-icon [img]="icons.Bell" [size]="18" /><span>5</span></button>
        <button class="profile" type="button"><span class="avatar">م</span><span>ایڈمن</span><lucide-icon [img]="icons.ChevronDown" [size]="15" /></button>
      </div>
    </header>
    <main><router-outlet /></main>
  </div>
  @if (sidebarOpen()) { <button class="backdrop" type="button" aria-label="مینو بند کریں" (click)="closeSidebar()"></button> }
</div>
