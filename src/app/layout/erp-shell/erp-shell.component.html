<div class="app-shell" [class.sidebar-visible]="sidebarOpen()" [class.sidebar-collapsed]="sidebarCollapsed()">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark"><lucide-icon [img]="icons.Store" [size]="22" /></span>
      <div><strong>ملک اشرف ٹریڈرز</strong><small>ای آر پی</small></div>
      <button class="split-toggle" type="button" title="سائیڈبار چھوٹا/بڑا کریں" (click)="toggleSidebarSplit()">
        <lucide-icon [img]="sidebarCollapsed() ? icons.PanelRightOpen : icons.PanelRightClose" [size]="19" />
      </button>
      <button class="mobile-close" type="button" title="مینو بند کریں" (click)="closeSidebar()"><lucide-icon [img]="icons.X" [size]="20" /></button>
    </div>
    <nav>
      @for (link of links; track $index) {
        <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.path === '/dashboard'}" (click)="closeSidebar()">
          <lucide-icon [img]="link.icon" [size]="18" /><span>{{ link.label }}</span>
        </a>
      }
    </nav>
    <a class="settings" routerLink="/settings" routerLinkActive="active" (click)="closeSidebar()"><lucide-icon [img]="icons.Settings" [size]="18" /><span>ترتیبات</span></a>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="topbar-title">
        <button class="menu-btn" type="button" title="مینو کھولیں" (click)="sidebarOpen.set(true)"><lucide-icon [img]="icons.Menu" [size]="23" /></button>
        <strong>کاروباری انتظام</strong>
      </div>
      <div class="topbar-actions">
        <button class="logout-btn" type="button" title="لاگ آؤٹ" (click)="logout()"><lucide-icon [img]="icons.LogOut" [size]="17" /><span>لاگ آؤٹ</span></button>
      </div>
    </header>
    <main><router-outlet /></main>
  </div>
  @if (sidebarOpen()) { <button class="backdrop" type="button" aria-label="مینو بند کریں" (click)="closeSidebar()"></button> }
</div>
